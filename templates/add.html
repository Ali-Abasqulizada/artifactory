<!DOCTYPE html>
<html lang="en">

{% include "navigation.html" %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifactory</title>
</head>

<style>
    * {
        font-family: Arial, Helvetica, sans-serif;
    }

    .code {
        background-color: #f4f4f4;
        padding: 10px;
        border-radius: 5px;
        font-family: monospace;
        margin: 10px 0;
    }

    .artifact-container {
        margin: 10px;
        padding: 10px;
        display: flex;
        gap: 40px;
    }

    .artifact-header {
        max-width: max-content;
    }

    .artifact-header .name {
        font-size: 28px;
        padding: 10px;
        text-align: center;
        border: 1px solid black;
    }

    .artifact-header .type {
        font-style: italic;
        font-size: 14px;
        margin-top: 5px;
    }

    .artifact-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
    }

    .artifact-item label {
        min-width: 120px;
        border-right: 1px solid black;
        padding-right: 10px;
    }

    .artifact-item input,
    .artifact-item textarea {
        padding: 8px;
        min-width: 320px;
        border: 1px solid black;
        border-radius: 4px;
    }

    .artifact-item textarea {
        min-height: 80px;
        resize: vertical;
    }

    .submit-button {
        text-decoration: none;
        color: black;
        border: 1px solid black;
        border-left: 1px solid black;
        padding: 10px 18px;
        background-color: white;
        cursor: pointer;
        font-weight: bold;
    }

    .submit-button:hover {
        background-color: #f4f4f4;
    }

    .status-box {
        margin-top: 15px;
        padding: 10px;
        border-radius: 5px;
        background-color: #f4f4f4;
        font-family: monospace;
        max-width: 600px;
        white-space: pre-wrap;
    }
</style>

<div class="artifact-container">
    <div class="artifact-header">
        <div class="name">Push Artifact</div>
        <div class="type">Upload artifact using POST method</div>

        <p>
            This form sends a POST request to:
        </p>

        <div class="code">/push</div>

        <form id="pushArtifactForm" enctype="multipart/form-data">
            <div class="artifact-item">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="example_artifact" pattern="[a-zA-Z0-9-_]+"
                    title="Only letters, numbers, dash and underscore are allowed" required>
            </div>

            <div class="artifact-item">
                <label for="commit_hash">Commit Hash</label>
                <input type="text" id="commit_hash" name="commit_hash" placeholder="abc123" required>
            </div>

            <div class="artifact-item">
                <label for="tags">Tags</label>
                <textarea id="tags" name="tags" placeholder='["dev", "test", "v1"]'></textarea>
            </div>

            <div class="artifact-item">
                <label for="file">File</label>
                <input type="file" id="file" name="file" required>
            </div>

            <div class="artifact-item">
                <label></label>
                <button type="submit" class="submit-button">Push Artifact</button>
            </div>
        </form>

        <div id="pushStatus" class="status-box">Status: Waiting for upload...</div>
    </div>
</div>

<script>
    document.getElementById("pushArtifactForm").addEventListener("submit", async function (event) {
        event.preventDefault();

        const statusBox = document.getElementById("pushStatus");

        const name = document.getElementById("name").value;
        const commitHash = document.getElementById("commit_hash").value;
        const tags = document.getElementById("tags").value;
        const fileInput = document.getElementById("file");

        if (!fileInput.files.length) {
            statusBox.textContent = "Error: Please select a file.";
            return;
        }

        const formData = new FormData();
        formData.append("name", name);
        formData.append("commit_hash", commitHash);
        formData.append("tags", tags);
        formData.append("file", fileInput.files[0]);

        statusBox.textContent = "Status: Uploading...";

        try {
            const response = await fetch("/push", {
                method: "POST",
                body: formData
            });

            const responseText = await response.text();

            if (response.ok) {
                statusBox.textContent =
                    "Status: Success\n" +
                    "HTTP Code: " + response.status + "\n" +
                    "Response: " + responseText;
            } else {
                statusBox.textContent =
                    "Status: Failed\n" +
                    "HTTP Code: " + response.status + "\n" +
                    "Response: " + responseText;
            }
        } catch (error) {
            statusBox.textContent =
                "Status: Error\n" +
                "Message: " + error.message;
        }
    });
</script>
